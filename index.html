<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票倉位與即時圖表計算器</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <style>
    body { background-color: #0F0F0F; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card-panel { background-color: #1e1e1e; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    input, select { background-color: #2a2a2a !important; border: 1px solid #444 !important; color: white !important; }
    input:focus, select:focus { border-color: #2979ff !important; outline: none; }
    .btn-primary { background-color: #2979ff; transition: 0.3s; }
    .btn-primary:hover { background-color: #1c54b2; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .uppercase-input { text-transform: uppercase; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #0F0F0F; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen p-1.5 md:p-6">

  <div id="toastContainer" class="fixed top-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

  <!-- API 設置 Modal -->
  <div id="apiSettingsModal" class="fixed inset-0 z-[999] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-[#1e1e1e] border border-[#333] p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
      <h3 class="text-white font-bold mb-4 text-lg">🔑 API Key 設置</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-[11px] font-bold text-[#2979ff] mb-1">Finnhub API Key</label>
          <input id="finnhubKeyInput" type="text" class="w-full px-3 py-2 text-sm rounded-lg bg-[#2a2a2a] border border-[#444] text-white outline-none">
        </div>
        <div>
          <label class="block text-[11px] font-bold text-[#00e676] mb-1">Twelve Data API Key</label>
          <input id="twelveDataKeyInput" type="text" class="w-full px-3 py-2 text-sm rounded-lg bg-[#2a2a2a] border border-[#444] text-white outline-none">
        </div>
      </div>
      <div class="flex justify-end space-x-3 mt-6">
        <button id="apiModalCancel" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-colors">取消</button>
        <button id="apiModalSave" class="px-4 py-2 rounded-lg text-sm font-bold bg-[#2979ff] text-white shadow-lg">儲存</button>
      </div>
    </div>
  </div>

  <!-- 手動歷史 Modal -->
  <div id="manualHistoryModal" class="fixed inset-0 z-[999] hidden items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-[#1e1e1e] border border-[#333] p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
      <h3 class="text-white font-bold mb-4 text-lg">➕ 手動加入歷史紀錄</h3>
      <form id="manualHistoryForm" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2 flex space-x-2 bg-[#2a2a2a] p-1 rounded-lg border border-[#444]">
            <label class="flex-1 text-center cursor-pointer"><input type="radio" name="mhDirection" value="long" class="peer sr-only" checked><div class="text-[11px] font-bold text-slate-400 py-1.5 rounded peer-checked:bg-[#00e676]/20 peer-checked:text-[#00e676]">🟢 做多</div></label>
            <label class="flex-1 text-center cursor-pointer"><input type="radio" name="mhDirection" value="short" class="peer sr-only"><div class="text-[11px] font-bold text-slate-400 py-1.5 rounded peer-checked:bg-[#ff5252]/20 peer-checked:text-[#ff5252]">🔴 做空</div></label>
          </div>
          <div class="col-span-2"><label class="text-[11px] text-slate-400">交易日期</label><input type="date" id="mhDate" required class="w-full px-3 py-2 text-sm rounded-lg bg-[#2a2a2a]"></div>
          <div><label class="text-[11px] text-slate-400">代號</label><input type="text" id="mhSymbol" required class="w-full px-3 py-2 text-sm rounded-lg uppercase"></div>
          <div><label class="text-[11px] text-slate-400">數量</label><input type="number" step="any" id="mhQty" required class="w-full px-3 py-2 text-sm rounded-lg"></div>
          <div><label class="text-[11px] text-[#2979ff]">買入價</label><input type="number" step="any" id="mhBuy" required class="w-full px-3 py-2 text-sm rounded-lg"></div>
          <div><label class="text-[11px] text-[#00e676]">賣出價</label><input type="number" step="any" id="mhSell" placeholder="選填" class="w-full px-3 py-2 text-sm rounded-lg"></div>
        </div>
        <div class="flex justify-end space-x-3 mt-4">
          <button type="button" onclick="closeManualHistoryModal()" class="text-sm text-slate-400 px-4">取消</button>
          <button type="submit" class="bg-[#2979ff] text-white px-4 py-2 rounded-lg text-sm font-bold">加入</button>
        </div>
      </form>
    </div>
  </div>

  <div class="max-w-[1600px] w-[99%] md:w-[96%] mx-auto space-y-2 md:space-y-4">
    <header class="flex justify-between items-center pb-2 md:pb-3 border-b border-[#333]">
      <div class="flex items-center space-x-2 md:space-x-4">
        <div class="bg-[#1e1e1e] border border-[#333] p-1.5 rounded-lg shadow-lg flex items-center justify-center w-8 h-8 md:w-12 md:h-12 text-base md:text-2xl">📊</div>
        <div><h1 class="text-sm md:text-2xl font-bold text-white">股票倉位計算器 <span class="text-[9px] md:text-xs text-[#2979ff] bg-[#2979ff]/10 px-1 py-0.5 rounded ml-1">PRO</span><span id="cloudSyncStatus" class="text-[9px] text-slate-500 ml-2">☁️ 連線中</span></h1></div>
      </div>
      <div class="flex items-center space-x-2 shrink-0">
        <button id="exportBtn" class="text-[10px] md:text-xs bg-[#2a2a2a] text-slate-300 px-2 py-1.5 rounded-lg hidden md:block">📤 導出</button>
        <button id="apiKeyBtn" class="text-[10px] md:text-xs bg-[#2a2a2a] text-slate-300 px-2 py-1.5 rounded-lg">🔑 API 設置</button>
      </div>
    </header>

    <div class="flex flex-col lg:flex-row gap-2 md:gap-5">
      <!-- 左側面板 -->
      <div class="w-full lg:w-[340px] xl:w-[380px] shrink-0 space-y-2 md:space-y-3">
        <div class="card-panel p-2 md:p-3 rounded-xl">
          <div class="flex justify-between items-center mb-1.5">
            <h2 class="text-[11px] font-bold text-white">市場報價</h2>
            <div class="flex items-center space-x-1.5">
              <span id="lastUpdateTime" class="text-[8px] text-slate-400 font-mono"></span>
              <select id="dataSourceSelect" class="bg-[#2a2a2a] text-[9px] text-white border border-[#444] rounded px-1 py-0.5"><option value="finnhub">Finnhub</option><option value="twelvedata">TwelveData</option></select>
              <label class="flex items-center text-[9px] text-slate-300"><input type="checkbox" id="autoRefreshCheckbox" class="mr-1"><input type="number" id="refreshIntervalInput" value="2" min="1" class="w-7 text-center bg-transparent border-none p-0 text-[#2979ff] font-bold"> 秒</label>
            </div>
          </div>
          <div class="flex gap-2">
            <div class="relative flex-1" id="tickerInputContainer">
              <input id="tickerInput" type="text" class="w-full px-3 py-1.5 text-xs font-bold rounded-lg uppercase-input" placeholder="代號 (AAPL)">
              <div id="tickerDropdown" class="hidden absolute top-full left-0 w-full mt-1 bg-[#1e1e1e] border border-[#444] rounded-lg z-50 max-h-48 overflow-y-auto"></div>
            </div>
            <button id="fetchBtn" class="btn-primary text-white text-xs font-bold px-3 py-1.5 rounded-lg">抓取</button>
          </div>
        </div>

        <div class="card-panel p-2 md:p-3 rounded-xl">
          <h2 class="text-[11px] font-bold text-white mb-2">新增建倉紀錄</h2>
          <form id="addForm" class="space-y-2">
            <div class="flex space-x-2 bg-[#2a2a2a] p-1 rounded-lg border border-[#444]">
              <label class="flex-1 text-center cursor-pointer"><input type="radio" name="tradeDirection" value="long" class="peer sr-only" checked><div class="text-[10px] py-1 rounded peer-checked:bg-[#00e676]/20 peer-checked:text-[#00e676]">多</div></label>
              <label class="flex-1 text-center cursor-pointer"><input type="radio" name="tradeDirection" value="short" class="peer sr-only"><div class="text-[10px] py-1 rounded peer-checked:bg-[#ff5252]/20 peer-checked:text-[#ff5252]">空</div></label>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div><label class="text-[10px] text-slate-400">數量</label><input id="qtyInput" type="number" step="any" class="w-full px-2 py-1.5 text-xs rounded-lg" required></div>
              <div><label class="text-[10px] text-slate-400">價位</label><input id="priceInput" type="number" step="any" class="w-full px-2 py-1.5 text-xs rounded-lg" required></div>
            </div>
            <button type="submit" class="w-full bg-[#2979ff] text-white text-xs font-bold py-2 rounded-lg">加入計算模型</button>
          </form>
        </div>

        <div class="card-panel p-2 rounded-xl">
          <div class="flex space-x-1 bg-black p-1 rounded-lg mb-2">
            <button onclick="switchTab('target')" id="btn-tab-target" class="flex-1 text-[11px] py-1 rounded bg-[#2979ff] text-white">預期試算</button>
            <button onclick="switchTab('alert')" id="btn-tab-alert" class="flex-1 text-[11px] py-1 rounded text-slate-400">🔔 提醒</button>
          </div>
          <div id="tab-target" class="space-y-2">
            <div class="grid grid-cols-2 gap-2">
              <input id="targetPriceInput" type="number" step="any" placeholder="目標價" class="w-full px-2 py-1.5 text-xs rounded-lg">
              <input id="percentInput" type="number" step="any" placeholder="%" class="w-full px-2 py-1.5 text-xs rounded-lg">
            </div>
            <div id="pnlResult" class="hidden"></div>
          </div>
          <div id="tab-alert" class="hidden space-y-2">
            <form id="alertForm" class="flex gap-1">
              <select id="alertCondition" class="text-[10px] rounded bg-[#2a2a2a] border border-[#444]"><option value=">">≥</option><option value="<">≤</option></select>
              <input id="alertPrice" type="number" step="any" placeholder="價位" class="flex-1 px-2 py-1 text-xs rounded bg-[#2a2a2a]">
              <button type="submit" class="bg-[#2979ff] text-white px-2 rounded font-bold">+</button>
            </form>
            <div id="alertListContainer" class="grid grid-cols-2 gap-1 max-h-32 overflow-y-auto no-scrollbar"></div>
          </div>
        </div>
      </div>

      <!-- 右側內容 -->
      <div class="flex-1 min-w-0 space-y-2 md:space-y-4">
        <div class="grid grid-cols-5 gap-1 md:gap-3">
          <div class="card-panel p-1.5 rounded-lg flex flex-col justify-center">
            <span class="text-slate-500 text-[7px] md:text-[9px] font-bold">成交價</span>
            <input id="currentPriceDisp" type="number" step="any" class="text-xs sm:text-sm md:text-xl font-bold bg-transparent border-none p-0 outline-none">
          </div>
          <div class="card-panel p-1.5 rounded-lg flex flex-col justify-center"><span class="text-slate-500 text-[7px] md:text-[9px] font-bold">成本</span><span id="avgPriceDisp" class="text-xs sm:text-sm md:text-xl font-bold">0</span></div>
          <div class="card-panel p-1.5 rounded-lg flex flex-col justify-center"><span class="text-slate-500 text-[7px] md:text-[9px] font-bold">股數</span><span id="totalSharesDisp" class="text-xs sm:text-sm md:text-xl font-bold text-[#2979ff]">0</span></div>
          <div class="card-panel p-1.5 rounded-lg flex flex-col justify-center"><span class="text-slate-500 text-[7px] md:text-[9px] font-bold">投入</span><span id="totalCostDisp" class="text-xs sm:text-sm md:text-xl font-bold">0</span></div>
          <div class="card-panel p-1.5 rounded-lg flex flex-col justify-center"><span class="text-slate-500 text-[7px] md:text-[9px] font-bold">盈虧</span><div class="flex flex-col leading-none"><span id="currentPnlAmountDisp" class="text-xs sm:text-sm md:text-xl font-bold text-slate-600">-</span><span id="currentPnlPercentDisp" class="text-[7px] md:text-[10px] font-bold text-slate-600">-</span></div></div>
        </div>

        <div class="card-panel p-2 md:p-4 rounded-2xl">
          <div id="tvchart" class="w-full h-[260px] md:h-[450px] bg-[#0F0F0F] rounded-xl overflow-hidden border border-[#333]"></div>
        </div>

        <div class="card-panel rounded-2xl overflow-hidden flex flex-col flex-1 min-h-[300px]">
          <div class="p-2 md:p-4 border-b border-[#333] flex justify-between items-center bg-[#1e1e1e]">
            <div class="flex space-x-2 md:space-x-6 overflow-x-auto no-scrollbar">
              <button id="tabBtnCurrent" onclick="switchRecordsTab('current')" class="text-[10px] md:text-xs font-bold text-[#2979ff] border-b-2 border-[#2979ff] pb-1 whitespace-nowrap">當前倉位 (<span id="currentCount">0</span>)</button>
              <button id="tabBtnHistory" onclick="switchRecordsTab('history')" class="text-[10px] md:text-xs font-bold text-slate-500 pb-1 whitespace-nowrap">歷史紀錄 (<span id="historyCount">0</span>)</button>
              <button id="tabBtnReport" onclick="switchRecordsTab('report')" class="text-[10px] md:text-xs font-bold text-slate-500 pb-1 whitespace-nowrap">收益日曆</button>
            </div>
            <div id="historyActions" class="hidden flex items-center space-x-1.5">
              <input type="text" id="historySearchInput" placeholder="🔍" class="w-12 bg-[#2a2a2a] border border-[#444] rounded px-1 py-0.5 text-[10px]">
              <button onclick="openManualHistoryModal()" class="text-[10px] font-bold text-[#2979ff] border border-[#2979ff]/40 px-1.5 py-0.5 rounded">➕ 加入</button>
            </div>
          </div>
          
          <div id="currentRecordsView" class="overflow-x-auto"><table class="w-full text-left text-[9px] md:text-sm"><thead class="bg-[#1e1e1e] border-b border-[#333] text-slate-500"><th class="px-2 py-2">代號</th><th class="px-2">數量</th><th class="px-2">價位</th><th class="px-2">損益</th><th class="px-2 text-right">ACTION</th></thead><tbody id="recordsTableBody" class="divide-y divide-[#333]"></tbody></table></div>
          <div id="historyRecordsView" class="hidden max-h-[600px] overflow-auto"><table class="w-full text-left text-[9px] md:text-sm"><thead class="sticky top-0 bg-[#1e1e1e] border-b border-[#333] text-slate-500 shadow-sm"><th class="px-2 py-2">時間</th><th class="px-2">代號</th><th class="px-2">買入</th><th class="px-2">賣出</th><th class="px-2">盈虧</th><th class="px-2 text-right">ACTION</th></thead><tbody id="historyTableBody" class="divide-y divide-[#333]"></tbody></table></div>
          
          <div id="reportView" class="hidden p-2 md:p-4 max-h-[600px] overflow-y-auto">
            <div class="flex justify-between items-center mb-3">
              <h3 class="text-xs font-bold">收益日曆 (USD)</h3>
              <input type="month" id="reportMonthPicker" class="bg-[#2a2a2a] text-white border border-[#444] rounded px-2 py-1 text-[10px]">
            </div>
            <div class="grid grid-cols-7 gap-1 text-center mb-1 text-[8px] md:text-[10px] text-slate-500"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
            <div id="reportCalendarGrid" class="grid grid-cols-7 gap-1"></div>
            <div class="mt-4 flex justify-between border-t border-[#333] pt-3">
              <div><div class="text-[8px] text-slate-500">月累計</div><div id="reportMonthTotal" class="text-lg font-bold">+0.00</div></div>
              <div class="text-right"><div class="text-[8px] text-slate-500">年累計</div><div id="reportYearTotal" class="text-lg font-bold">+0.00</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    // 💡 補回 signInWithCustomToken 核心認證模組
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAp9LarWFf1Cru8VyzfMPeTKLmjgJumEmU",
        authDomain: "stockstock-432d5.firebaseapp.com",
        projectId: "stockstock-432d5",
        storageBucket: "stockstock-432d5.firebasestorage.app",
        messagingSenderId: "651237908905",
        appId: "1:651237908905:web:d29f5e0b6da78d14cb64b8"
    };

    const app = initializeApp(typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appIdStr = typeof __app_id !== 'undefined' ? __app_id : 'stock-calculator-v1';

    // 核心同步身份標識：防回音牆
    const myClientId = Math.random().toString(36).substring(2, 10);
    let isApplyingCloudUpdate = false;
    let currentUser = null;

    // 全域資料狀態
    const STORAGE_KEY_HISTORY = 'stockCalcHistory_PRO';
    const STORAGE_KEY_TICKERS = 'savedTickers_PRO';
    const STORAGE_KEY_ALERTS = 'stockCalcAlerts_PRO';
    const STORAGE_KEY_STATE = 'stockCalcStateHTML_PRO_V3';

    let records = [], tradeHistory = [], savedTickers = [], priceAlerts = [];
    let averagePrice = 0, totalShares = 0, totalCost = 0;
    let quoteInterval = null, currentChartSymbol = '', currentChartInterval = 'D';
    let FINNHUB_API_KEY = localStorage.getItem('finnhub_saved_key_v3') || 'd730469r01qn7f075d8gd730469r01qn7f075d90';
    let TWELVE_DATA_API_KEY = localStorage.getItem('twelvedata_saved_key_v1') || 'c56ad44f83f64dcf936b8340786e0887';

    // DOM 元素引用 (確保完整引用，修復 TypeError: Cannot read properties of undefined)
    const els = {
      syncStatus: document.getElementById('cloudSyncStatus'),
      recordsTableBody: document.getElementById('recordsTableBody'),
      historyTableBody: document.getElementById('historyTableBody'),
      reportCalendarGrid: document.getElementById('reportCalendarGrid'),
      currentCount: document.getElementById('currentCount'),
      historyCount: document.getElementById('historyCount'),
      totalSharesDisp: document.getElementById('totalSharesDisp'),
      totalCostDisp: document.getElementById('totalCostDisp'),
      avgPriceDisp: document.getElementById('avgPriceDisp'),
      currentPriceDisp: document.getElementById('currentPriceDisp'),
      currentPnlAmountDisp: document.getElementById('currentPnlAmountDisp'),
      currentPnlPercentDisp: document.getElementById('currentPnlPercentDisp'),
      tickerInput: document.getElementById('tickerInput'),
      tickerDropdown: document.getElementById('tickerDropdown'),
      dataSourceSelect: document.getElementById('dataSourceSelect'),
      autoRefreshCheckbox: document.getElementById('autoRefreshCheckbox'),
      refreshIntervalInput: document.getElementById('refreshIntervalInput'),
      reportMonthPicker: document.getElementById('reportMonthPicker'),
      reportMonthTotal: document.getElementById('reportMonthTotal'),
      reportYearTotal: document.getElementById('reportYearTotal'),
      targetPriceInput: document.getElementById('targetPriceInput'),
      percentInput: document.getElementById('percentInput'),
      pnlResult: document.getElementById('pnlResult'),
      addForm: document.getElementById('addForm'),
      fetchBtn: document.getElementById('fetchBtn'),
      alertForm: document.getElementById('alertForm'),
      alertPrice: document.getElementById('alertPrice'),
      alertCondition: document.getElementById('alertCondition'),
      alertListContainer: document.getElementById('alertListContainer'),
      historyActions: document.getElementById('historyActions'),
      historySearchInput: document.getElementById('historySearchInput'),
      currentRecordsView: document.getElementById('currentRecordsView'),
      historyRecordsView: document.getElementById('historyRecordsView'),
      reportView: document.getElementById('reportView'),
      tabBtnCurrent: document.getElementById('tabBtnCurrent'),
      tabBtnHistory: document.getElementById('tabBtnHistory'),
      tabBtnReport: document.getElementById('tabBtnReport'),
      tvchartContainer: document.getElementById('tvchart')
    };

    // --- 🚀 終極同步邏輯：強制 Auth 認證 + 公共頻道模式 ---
    const initAuth = async () => {
      try {
        // 💡 必須透過這段程式碼向 Firebase 提交系統的環境通行證，否則所有讀寫都會被伺服器阻擋
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Auth Error:", error);
        showToast('Firebase 登入失敗：請確認匿名登入已啟用', 'error');
        updateSyncStatus('error');
      }
    };

    // 監聽登入狀態，登入成功才啟動同步
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        initRealtimeSync();
      } else {
        currentUser = null;
        updateSyncStatus('error');
      }
    });

    async function initRealtimeSync() {
        const docRef = doc(db, 'artifacts', appIdStr, 'public', 'data', 'calculatorData', 'global_state');
        
        onSnapshot(docRef, (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                if (data.lastUpdatedBy === myClientId) return;

                console.log("☁️ 偵測到雲端更新，同步中...");
                isApplyingCloudUpdate = true; 

                records = data.records || [];
                tradeHistory = data.tradeHistory || [];
                savedTickers = data.savedTickers || [];
                priceAlerts = data.priceAlerts || [];

                commitToUI(); 
                
                isApplyingCloudUpdate = false; 
                updateSyncStatus('synced');
            } else {
                if (records.length > 0 || tradeHistory.length > 0) pushToCloud();
                updateSyncStatus('synced');
            }
        }, (err) => {
            console.error("Firestore Listen Error:", err);
            // 💡 若被 Firebase 規則阻擋，會直接在畫面彈出紅框警告
            showToast('同步被 Firebase 拒絕：權限不足 (Rules)', 'error');
            updateSyncStatus('error');
        });
    }

    function pushToCloud() {
        if (isApplyingCloudUpdate || !currentUser) return;
        updateSyncStatus('syncing');
        
        const docRef = doc(db, 'artifacts', appIdStr, 'public', 'data', 'calculatorData', 'global_state');
        const stateToSave = {
            records, tradeHistory, savedTickers, priceAlerts,
            lastUpdatedBy: myClientId,
            updatedAt: Date.now()
        };
        
        setDoc(docRef, stateToSave).then(() => {
            updateSyncStatus('synced');
        }).catch((err) => {
            console.error("Sync Write Error:", err);
            showToast('上傳被 Firebase 拒絕：' + err.message, 'error');
            updateSyncStatus('error');
        });
    }

    function updateSyncStatus(status) {
        if(!els.syncStatus) return;
        if (status === 'syncing') { els.syncStatus.innerHTML = '☁️ 同步中...'; els.syncStatus.className = 'text-[9px] text-amber-500 animate-pulse'; }
        else if (status === 'synced') { els.syncStatus.innerHTML = '☁️ 即時連線'; els.syncStatus.className = 'text-[9px] text-[#00e676]'; }
        else { els.syncStatus.innerHTML = '☁️ 離線模式'; els.syncStatus.className = 'text-[9px] text-rose-500'; }
    }

    // --- 中央介面管理器 ---
    function commitToUI() {
        // 1. 本地備份
        localStorage.setItem(STORAGE_KEY_STATE, JSON.stringify({records, ticker: els.tickerInput.value}));
        localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(tradeHistory));
        localStorage.setItem(STORAGE_KEY_TICKERS, JSON.stringify(savedTickers));
        localStorage.setItem(STORAGE_KEY_ALERTS, JSON.stringify(priceAlerts));

        // 2. 重新計算看板
        totalShares = records.reduce((s, r) => s + r.quantity, 0);
        totalCost = records.reduce((s, r) => s + r.cost, 0);
        averagePrice = totalShares > 0 ? totalCost / totalShares : 0;

        if(els.totalSharesDisp) els.totalSharesDisp.textContent = formatNumber(totalShares);
        if(els.totalCostDisp) els.totalCostDisp.textContent = formatNumber(totalCost);
        if(els.avgPriceDisp) els.avgPriceDisp.textContent = formatNumber(averagePrice, 4);

        // 3. 重繪表格與組件
        renderTable();
        renderHistoryTable();
        renderReport();
        renderAlerts();
        renderTickerDropdown();
    }

    const originalSetItem = window.localStorage.setItem;
    window.localStorage.setItem = function(key, value) {
        originalSetItem.apply(window.localStorage, arguments);
        if (isApplyingCloudUpdate) return;
        if ([STORAGE_KEY_STATE, STORAGE_KEY_HISTORY, STORAGE_KEY_TICKERS, STORAGE_KEY_ALERTS].includes(key)) {
            pushToCloud();
        }
    };

    function formatNumber(num, decimals = 2) { return new Intl.NumberFormat('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: decimals }).format(num); }

    function renderTable() {
        if(!els.recordsTableBody) return;
        els.currentCount.textContent = records.length;
        if (records.length === 0) { els.recordsTableBody.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-slate-500 text-[10px]">無持倉紀錄</td></tr>'; return; }
        const curP = parseFloat(els.currentPriceDisp.value) || 0;
        els.recordsTableBody.innerHTML = records.map(r => {
            const pnl = (curP - r.price) * r.quantity;
            const pct = ((curP - r.price) / r.price) * 100;
            const color = pnl >= 0 ? 'text-[#00e676]' : 'text-[#ff5252]';
            return `<tr class="hover:bg-white/[0.03] transition-colors"><td class="px-2 py-2 font-bold text-[#2979ff]">${r.ticker}</td><td class="px-2">${formatNumber(r.quantity)}</td><td class="px-2 text-slate-400">$${formatNumber(r.price, 4)}</td><td class="px-2 ${color}">${formatNumber(pnl)} (${formatNumber(pct)}%)</td><td class="px-2 text-right"><button onclick="deleteRecord('${r.id}')" class="text-slate-600 hover:text-rose-500">🗑️</button></td></tr>`;
        }).join('');
    }

    window.deleteRecord = (id) => { records = records.filter(r => r.id !== id); commitToUI(); };
    window.deleteHistoryRecord = (id) => { tradeHistory = tradeHistory.filter(r => r.id !== id); commitToUI(); };

    function renderHistoryTable() {
        if(!els.historyTableBody) return;
        els.historyCount.textContent = tradeHistory.length;
        if (tradeHistory.length === 0) { els.historyTableBody.innerHTML = '<tr><td colspan="6" class="py-10 text-center text-slate-500 text-[10px]">無交易紀錄</td></tr>'; return; }
        els.historyTableBody.innerHTML = tradeHistory.map(r => {
            const pnl = (parseFloat(r.sellPrice || 0) - r.price) * r.quantity - (r.fee || 0);
            const color = pnl >= 0 ? 'text-[#00e676]' : 'text-[#ff5252]';
            return `<tr class="hover:bg-white/[0.03] text-[10px] md:text-xs"><td class="px-2 py-2 text-slate-500 font-mono">${r.time}</td><td class="px-2 font-bold text-[#2979ff]">${r.ticker}</td><td class="px-2">$${formatNumber(r.price, 2)}</td><td class="px-2"><input type="number" step="any" value="${r.sellPrice||''}" onchange="updateHistory('${r.id}', 'sellPrice', this.value)" class="w-12 bg-transparent border-b border-dashed border-slate-600 outline-none text-center"></td><td class="px-2 ${color}">${formatNumber(pnl)}</td><td class="px-2 text-right"><button onclick="deleteHistoryRecord('${r.id}')" class="text-slate-600">🗑️</button></td></tr>`;
        }).join('');
    }

    window.updateHistory = (id, f, v) => { const r = tradeHistory.find(x => x.id === id); if(r) { r[f] = parseFloat(v); commitToUI(); } };

    function renderReport() {
        if (!els.reportCalendarGrid) return;
        const pickerVal = els.reportMonthPicker.value;
        if (!pickerVal) return;
        const [year, month] = pickerVal.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const firstDay = new Date(year, month - 1, 1).getDay();
        const dailyProfit = {};
        let monthlyTotal = 0, yearlyTotal = 0;

        tradeHistory.forEach(r => {
            if (!r.sellPrice) return;
            const recordDate = r.dateStr ? new Date(r.dateStr) : new Date(parseInt(r.id));
            const pnl = (r.sellPrice - r.price) * r.quantity - (r.fee || 0);
            if (recordDate.getFullYear() === year) {
                yearlyTotal += pnl;
                if (recordDate.getMonth() + 1 === month) {
                    const d = recordDate.getDate();
                    dailyProfit[d] = (dailyProfit[d] || 0) + pnl;
                    monthlyTotal += pnl;
                }
            }
        });

        let html = '';
        for (let i = 0; i < firstDay; i++) html += `<div class="p-1 min-h-[45px]"></div>`;
        for (let d = 1; d <= daysInMonth; d++) {
            const profit = dailyProfit[d];
            const bg = profit > 0 ? 'bg-[#00e676]/10 border border-[#00e676]/20' : profit < 0 ? 'bg-[#ff5252]/10 border border-[#ff5252]/20' : 'bg-[#2a2a2a]';
            const color = profit > 0 ? 'text-[#00e676]' : 'text-[#ff5252]';
            html += `<div class="flex flex-col items-center justify-center p-0.5 min-h-[45px] rounded ${bg}"><span class="text-[10px] text-slate-300">${d}</span>${profit ? `<span class="text-[7.5px] font-bold ${color} whitespace-nowrap overflow-hidden">${profit > 0 ? '+' : ''}${Math.round(profit)}</span>` : ''}</div>`;
        }
        els.reportCalendarGrid.innerHTML = html;
        els.reportMonthTotal.textContent = (monthlyTotal > 0 ? '+' : '') + formatNumber(monthlyTotal);
        els.reportMonthTotal.className = `text-lg font-bold ${monthlyTotal >= 0 ? 'text-[#00e676]' : 'text-[#ff5252]'}`;
        els.reportYearTotal.textContent = (yearlyTotal > 0 ? '+' : '') + formatNumber(yearlyTotal);
    }

    async function fetchStockData() {
        const symbol = els.tickerInput.value.toUpperCase().trim();
        if (!symbol) return;
        if (symbol !== currentChartSymbol) renderTradingViewWidget(symbol, currentChartInterval);
        try {
            const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_API_KEY}`);
            const data = await res.json();
            if (data && data.c) {
                els.currentPriceDisp.value = data.c;
                renderTable();
                updateLastTime(data.t);
                addTicker(symbol);
            }
        } catch (e) { console.error(e); }
    }

    function updateLastTime(t) {
        const d = t ? new Date(t * 1000) : new Date();
        if(els.lastUpdateTime) els.lastUpdateTime.textContent = `澳門時間 ${d.toLocaleTimeString('zh-TW', { timeZone: 'Asia/Macau', hour12: false })}`;
    }

    function addTicker(s) { savedTickers = [s, ...savedTickers.filter(x => x !== s)].slice(0, 15); commitToUI(); }
    function renderTickerDropdown() { if(els.tickerDropdown) els.tickerDropdown.innerHTML = savedTickers.map(t => `<div class="px-4 py-2 hover:bg-[#333] cursor-pointer font-bold text-xs" onclick="selectTicker('${t}')">${t}</div>`).join(''); }
    window.selectTicker = (t) => { els.tickerInput.value = t; if(els.tickerDropdown) els.tickerDropdown.classList.add('hidden'); fetchStockData(); };

    function renderTradingViewWidget(symbol, interval) {
        if (typeof TradingView === 'undefined' || !els.tvchartContainer) return;
        els.tvchartContainer.innerHTML = '';
        new TradingView.widget({
            "autosize": true,
            "symbol": "BATS:" + symbol,
            "interval": interval,
            "timezone": "Asia/Taipei",
            "theme": "dark",
            "style": "1",
            "locale": "zh_TW",
            "toolbar_bg": "#0F0F0F",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "container_id": "tvchart",
            "studies": ["MASimple@tv-basicstudies"]
        });
        currentChartSymbol = symbol;
    }

    document.addEventListener('DOMContentLoaded', () => {
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY_STATE)) || {};
            records = saved.records || [];
            if(els.tickerInput) els.tickerInput.value = saved.ticker || '';
            tradeHistory = JSON.parse(localStorage.getItem(STORAGE_KEY_HISTORY)) || [];
            savedTickers = JSON.parse(localStorage.getItem(STORAGE_KEY_TICKERS)) || [];
            priceAlerts = JSON.parse(localStorage.getItem(STORAGE_KEY_ALERTS)) || [];
            if(els.reportMonthPicker) els.reportMonthPicker.value = new Date().toISOString().slice(0, 7);
            commitToUI();
            
            // 💡 啟動驗證流程，不再直接調用 initRealtimeSync
            initAuth(); 
        } catch(e) { console.error("Init Error", e); }
    });

    if(els.addForm) {
        els.addForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const p = parseFloat(document.getElementById('priceInput').value);
            const q = parseFloat(document.getElementById('qtyInput').value);
            const s = els.tickerInput.value.toUpperCase();
            const dir = document.querySelector('input[name="tradeDirection"]:checked').value;
            const now = new Date();
            records.unshift({ id: Date.now().toString(), ticker: s, price: p, quantity: q, cost: p * q, direction: dir });
            tradeHistory.unshift({ id: Date.now()+'h', time: now.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}), dateStr: now.toISOString().split('T')[0], ticker: s, price: p, quantity: q });
            commitToUI();
        });
    }

    if(els.fetchBtn) els.fetchBtn.addEventListener('click', fetchStockData);
    if(els.reportMonthPicker) els.reportMonthPicker.addEventListener('change', renderReport);
    
    window.switchTab = (t) => {
        const targetTab = document.getElementById('tab-target');
        const alertTab = document.getElementById('tab-alert');
        const targetBtn = document.getElementById('btn-tab-target');
        const alertBtn = document.getElementById('btn-tab-alert');
        if(targetTab) targetTab.classList.toggle('hidden', t !== 'target');
        if(alertTab) alertTab.classList.toggle('hidden', t !== 'alert');
        if(targetBtn) targetBtn.className = t === 'target' ? 'flex-1 text-[11px] py-1 rounded bg-[#2979ff] text-white' : 'flex-1 text-[11px] py-1 rounded text-slate-400';
        if(alertBtn) alertBtn.className = t === 'alert' ? 'flex-1 text-[11px] py-1 rounded bg-[#2979ff] text-white' : 'flex-1 text-[11px] py-1 rounded text-slate-400';
    };

    window.switchRecordsTab = (tab) => {
        if(els.currentRecordsView) els.currentRecordsView.classList.toggle('hidden', tab !== 'current');
        if(els.historyRecordsView) els.historyRecordsView.classList.toggle('hidden', tab !== 'history');
        if(els.reportView) els.reportView.classList.toggle('hidden', tab !== 'report');
        if(els.tabBtnCurrent) els.tabBtnCurrent.className = tab === 'current' ? 'text-[10px] md:text-xs font-bold text-[#2979ff] border-b-2 border-[#2979ff] pb-1 whitespace-nowrap' : 'text-[10px] md:text-xs font-bold text-slate-500 pb-1 whitespace-nowrap';
        if(els.tabBtnHistory) els.tabBtnHistory.className = tab === 'history' ? 'text-[10px] md:text-xs font-bold text-[#2979ff] border-b-2 border-[#2979ff] pb-1 whitespace-nowrap' : 'text-[10px] md:text-xs font-bold text-slate-500 pb-1 whitespace-nowrap';
        if(els.tabBtnReport) els.tabBtnReport.className = tab === 'report' ? 'text-[10px] md:text-xs font-bold text-[#2979ff] border-b-2 border-[#2979ff] pb-1 whitespace-nowrap' : 'text-[10px] md:text-xs font-bold text-slate-500 pb-1 whitespace-nowrap';
        if (tab === 'report') renderReport();
    };

    window.closeManualHistoryModal = () => document.getElementById('manualHistoryModal').classList.add('hidden');
    window.openManualHistoryModal = () => document.getElementById('manualHistoryModal').classList.remove('hidden');

    function renderAlerts() {
        if(!els.alertListContainer) return;
        // 簡單實現提醒列表渲染，修復同步依賴
        els.alertListContainer.innerHTML = priceAlerts.map(a => `
            <div class="bg-[#2a2a2a] p-1.5 rounded flex justify-between items-center text-[10px] border border-[#444]">
                <span>${a.ticker} ${a.condition} ${a.price}</span>
                <button onclick="deleteAlert('${a.id}')" class="text-rose-500">✕</button>
            </div>
        `).join('');
    }
    window.deleteAlert = (id) => { priceAlerts = priceAlerts.filter(a => a.id !== id); commitToUI(); };

    // --- Toast 通知 ---
    window.showToast = (msg, type = 'info') => {
        const container = document.getElementById('toastContainer');
        if(!container) return;
        const toast = document.createElement('div');
        toast.className = `px-4 py-2 rounded-lg shadow-2xl text-sm font-bold text-white transition-all duration-300 transform translate-x-full ${type === 'error' ? 'bg-rose-600' : type === 'success' ? 'bg-[#00e676]' : 'bg-[#2979ff]'}`;
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.classList.remove('translate-x-full'), 10);
        setTimeout(() => { toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 3000);
    };

  </script>
</body>
</html>
